name: scanctl

# Reusable workflow: drop one call into any repo to run the scanctl bundle.
# scanctl is fetched with `go install` (tools.lock is embedded, so the scanner
# pins travel with it); the scanners themselves are lazy-fetched at scan time.
#
# Caller example:
#   jobs:
#     security:
#       uses: catenahq/scanctl/.github/workflows/github-reusable.yml@v0
#       with:
#         scanctl-version: v0.1.0
#       permissions:
#         contents: read
#         security-events: write

on:
  workflow_call:
    inputs:
      scanctl-version:
        description: scanctl module version (tag) to install
        type: string
        default: latest
      path:
        description: repo subpath to scan
        type: string
        default: "."
      no-gate:
        description: scan + report but never fail the build
        type: boolean
        default: false
      profile:
        description: profile override ("full" runs resale-restricted tools, e.g. semgrep registry packs); empty = config default
        type: string
        default: ""
      runner:
        description: runs-on label
        type: string
        default: ubuntu-latest

jobs:
  scan:
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history so gitleaks scans past commits
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: Install uv
        # uv backs the Python scanners (semgrep, guarddog), lazy-fetched at scan time.
        uses: astral-sh/setup-uv@v6
      - name: Install scanctl
        run: go install github.com/catenahq/scanctl/cmd/scanctl@${{ inputs.scanctl-version }}
      - name: Run scanctl
        env:
          # zizmor's API-backed audits use this when present; absent = it runs --offline.
          GH_TOKEN: ${{ github.token }}
        run: |
          gate_flag=""
          if [ "${{ inputs.no-gate }}" = "true" ]; then gate_flag="--no-gate"; fi
          profile_flag=""
          if [ -n "${{ inputs.profile }}" ]; then profile_flag="--profile ${{ inputs.profile }}"; fi
          "$(go env GOPATH)/bin/scanctl" run $gate_flag $profile_flag \
            --out scanctl.sarif --sbom sbom.cdx.json \
            --summary "$GITHUB_STEP_SUMMARY" "${{ inputs.path }}"
      - name: Upload SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: scanctl.sarif
        continue-on-error: true
      - name: Upload SBOM artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
          if-no-files-found: ignore
