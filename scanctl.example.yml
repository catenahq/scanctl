# scanctl configuration. Every field is optional -- with no file at all,
# `scanctl run .` uses these same defaults. Copy to scanctl.yml to customize.

# Tool profile. "sellable" (default) is resale-clean: no Semgrep registry rules,
# no deps.dev/Google API. "full" additionally enables resale-restricted tools
# for personal / client-operates-own-box use.
profile: sellable

# Gate floor: a tool in "block" mode fails the run on a finding at or above this
# severity. One of: none, low, medium, high, critical.
gate:
  floor: high

# Per-tool switches. mode "block" can fail the run; "report" only surfaces
# findings. Defaults mirror catena-ce's split (deps/CVE block; SAST/secrets
# report until the baseline is acknowledged, then promote to block).
tools:
  osv-scanner:
    enabled: true
    mode: block
  trivy:
    enabled: true
    mode: block
  govulncheck:
    enabled: true
    mode: block
  gosec:
    enabled: true
    mode: report
  gitleaks:
    enabled: true
    mode: report

# Directory names skipped during detection (matched anywhere in the tree).
# Vendored + generated files are additionally skipped via go-enry, so this list
# only needs project-specific extras.
ignore:
  - .git
  - vendor
  - node_modules
  - testdata

# License identifiers the repo has reviewed and accepted; dropped from the
# trivy-license pass entirely (trivy --ignored-licenses) instead of surfacing
# as restricted-license findings on every run.
# license:
#   ignored:
#     - LGPL-3.0-or-later

# Aggregation plane (optional). Leave URLs empty for serverless operation.
# Credentials are env vars, never committed:
#   DEFECTDOJO_TOKEN          -> findings dashboard
#   DEPENDENCYTRACK_APIKEY    -> SBOM portfolio
# A target with a URL but a missing credential is skipped with a warning.
upload:
  defectdojo:
    url: ""              # e.g. https://defectdojo.internal
    product_name: ""     # default: scanctl
    engagement_name: ""  # default: scanctl
  dependency_track:
    url: ""              # e.g. https://deptrack.internal
    project_name: ""     # default: scanctl
    project_version: ""  # default: latest
