# Pinned scanner versions. The runner reads `version`; Renovate bumps each line
# via the customManager in renovate.json. Asset naming + download logic live in
# internal/runner (typed Go), so this file stays a flat version pin that both
# the runner and Renovate can read. Do not hand-edit versions -- let Renovate PR
# them so the bump is scanned + reviewed like any other dependency change.
tools:
  trivy:
    repo: aquasecurity/trivy
    # renovate: datasource=github-releases depName=aquasecurity/trivy
    version: 0.71.2
  osv-scanner:
    repo: google/osv-scanner
    # renovate: datasource=github-releases depName=google/osv-scanner
    version: 2.4.0
  gitleaks:
    repo: gitleaks/gitleaks
    # renovate: datasource=github-releases depName=gitleaks/gitleaks
    version: 8.30.1
  gosec:
    repo: securego/gosec
    # renovate: datasource=github-releases depName=securego/gosec
    version: 2.27.1
  govulncheck:
    module: golang.org/x/vuln
    # renovate: datasource=go depName=golang.org/x/vuln
    version: 1.4.0
  syft:
    repo: anchore/syft
    # renovate: datasource=github-releases depName=anchore/syft
    version: 1.45.1
  semgrep:
    # renovate: datasource=pypi depName=semgrep
    version: 1.168.0
  zizmor:
    repo: zizmorcore/zizmor
    # renovate: datasource=github-releases depName=zizmorcore/zizmor
    version: 1.26.1
  guarddog:
    # renovate: datasource=pypi depName=guarddog
    version: 3.0.1
