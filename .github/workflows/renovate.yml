name: Renovate

# Self-hosted Renovate: dependency automation runs on our own runner, not Mend's
# cloud app reading the repo. Reads renovate.json (which extends the shared
# supply-chain preset). Runs early daily -- inside the preset's "before 5am
# America/Toronto" window so it may actually open PRs -- and on demand via the
# Run workflow button (workflow_dispatch).
#
# Prerequisite: a RENOVATE_TOKEN repo/org secret. Use a fine-grained PAT (or a
# GitHub App installation token) with, on this repo: Contents read/write, Pull
# requests read/write, and (for the dependency dashboard) Issues read/write.

on:
  schedule:
    - cron: "0 6 * * *" # 01:00-02:00 Toronto, within the preset's open window
  workflow_dispatch:
    inputs:
      logLevel:
        description: Renovate log level
        type: choice
        options: [info, debug]
        default: info
      dryRun:
        description: Dry run (no PRs/branches written)
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  renovate:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6
      - name: Run Renovate
        uses: renovatebot/github-action@v46.1.15
        env:
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_PLATFORM: github
          LOG_LEVEL: ${{ inputs.logLevel || 'info' }}
          RENOVATE_DRY_RUN: ${{ inputs.dryRun && 'full' || '' }}
