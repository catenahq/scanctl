name: release

# CD: on a vX.Y.Z tag, build the binary for linux amd64+arm64, attach them to a
# GitHub Release, and publish a slim image to GHCR. Consumers pin the reusable
# workflow / module to the tag; their own Renovate bumps the ref (the pull leg).

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  binaries:
    runs-on: self-hosted
    permissions:
      contents: write # create the GitHub Release + upload the binaries
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Put Go on PATH
        run: echo "$HOME/.local/go/bin" >> "$GITHUB_PATH"
      - name: Build
        run: |
          set -euo pipefail
          ver="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          for arch in amd64 arm64; do
            GOOS=linux GOARCH="$arch" CGO_ENABLED=0 \
              go build -trimpath -ldflags "-s -w -X main.version=${ver}" \
              -o "dist/scanctl_linux_${arch}" ./cmd/scanctl
          done
      - name: Release
        # zizmor: ignore[superfluous-actions] -- this is a self-hosted runner
        # (see the manual "Put Go on PATH" step); the gh CLI is not guaranteed
        # present, so `gh release` is not a drop-in. The action is SHA-pinned.
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          files: dist/scanctl_linux_*
          generate_release_notes: true

  image:
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write # push the image to GHCR
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          push: true
          build-args: |
            VERSION=${{ github.ref_name }}
          tags: |
            ghcr.io/catenahq/scanctl:${{ github.ref_name }}
            ghcr.io/catenahq/scanctl:latest
